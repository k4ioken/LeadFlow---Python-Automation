name: Daily Notification Pipeline

on:
  schedule:
    # 7:00 AM IST translates to 1:30 AM UTC
    - cron: '30 1 * * *' 
  workflow_dispatch: # Enables a manual run button in the GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Credentials JSON file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > service_account.json

      - name: Run main script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python main.py
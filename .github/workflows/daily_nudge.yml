name: Daily Notification Pipeline

on:
  schedule:
    - cron: '30 1 * * *' 
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv gspread oauth2client requests twilio

      - name: Create Google Credentials JSON file
        env:
          CREDS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$CREDS_JSON" > service_account.json

      - name: Run main script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python main.py